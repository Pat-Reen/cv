<!DOCTYPE html>
<!--[if IE 8]> <html lang="en" class="ie8"> <![endif]-->
<!--[if IE 9]> <html lang="en" class="ie9"> <![endif]-->
<!--[if !IE]><!-->
<html lang="en">
  <!--<![endif]-->
  {% include head.html %}
  <style>
    body {
      padding: 0 !important;
    }
    .wrapper {
      max-width: unset !important;
      display: flex; /* added */
    }
    /* added */
    .main-wrapper {
      flex: 1;
    }
    .print-banner {
      background: #4B6A78;
      text-align: center;
      padding: 12px;
    }
    .print-banner button {
      background: #fff;
      color: #4B6A78;
      border: none;
      border-radius: 4px;
      padding: 8px 24px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    .contact-container .contact-list .fas,
    .contact-container .contact-list .fab,
    .contact-container .contact-list .far {
      margin-right: 12px;
    }
    .contact-container .contact-list .contact-text {
      margin-left: 0;
    }
  </style>
  <body>
    <div class="wrapper">
      <div class="main-wrapper">{{ content }}</div>
    </div>
    {% include scripts.html %}
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() { window.print(); }, 500);
      });
    </script>
  </body>
</html>
