career-profile:
    title: Overview
    summary: |
        I have 17 years’ experience in large financial services businesses,
        combining actuarial expertise with data strategy and modern platform delivery.
        In my current role I lead ClearView’s enterprise data and analytics capability,
        having transformed the organisation’s legacy architecture into a cloud-based
        data platform using Microsoft Fabric on Azure.

        My career spans data strategy, analytics leadership, cloud platform delivery,
        and actuarial roles across life insurance and reinsurance. I have a strong track
        record of accelerating insight delivery — through automation, process overhaul,
        and applying statistical modelling and data science to inform business decisions.

        Outside of work I maintain a personal projects repository covering statistics,
        coding experiments, and AI topics. I have a practical interest in large language
        models, RAG (retrieval-augmented generation) architectures, and AI ops — and
        have implemented RAG-based approaches in a professional context to enhance
        analytics and knowledge retrieval capabilities.

