experiences:
    - role: Head of Portfolio Insights
      time: Aug 2023 - Present
      company: ClearView Wealth Limited, Australia
      details: |
        Reporting to General Executive, Product & Pricing

        **Key achievement:** Led end-to-end transformation of legacy data architecture into a modern cloud data platform using Microsoft Fabric on Azure, delivering enterprise analytics capabilities across distribution, pricing, finance, operations and regulatory reporting.

          - Owned and executed the enterprise Data Strategy aligned with ClearView's broader business strategy.
          - Led delivery of an Azure-based modern data platform using Microsoft Fabric, replacing legacy on-premises architecture.
          - Established enterprise data ingestion, transformation, and analytics capabilities including orchestration pipelines, notebooks, DevOps/CI-CD, and infrastructure-as-code.
          - Delivered Salesforce data integration enabling improved distribution and adviser insights.
          - Developed analytics across distribution (adviser segmentation), pricing (competitive benchmarking), finance, operations, and regulatory reporting.
          - Established governance structures including a Data Forum and Data Champions network.
          - Delivered executive reporting and actionable portfolio insights to the Executive Leadership Team.
          - Applied Claude Code to trace complex legacy ETL dependencies, enabling a small team to accelerate month-end reporting migration.

    - role: Pricing and Analytics Consultant
      time: Sep 2022 - Aug 2023
      company: Munich Reinsurance, Australia (MRA)
      details: |
        Reporting to Head of Group Insurance (HoGI)

        **Key achievement:** Complete overhaul of pricing result visualisations and assumption setting processes, delivered on Databricks.

          - In this role I consulted on the redesign of group pricing processes with a view to improving efficiency and capabilities,
            increasing the level of result granularity, reducing operational risk and upskilling the team.
          - Translated business needs into technical requirements and led the viability assessment of proposed software solutions.
          - Collaborated with the HoGI and head of group pricing (HoGP) to define a target state and project plans. Supported stakeholder communication of same.
          - Engaged with support areas to clear a path for success e.g. group enterprise architecture,
            external software providers.
          - Devised and led the sprint plan.
          - Designed pricing result visualisations and enhanced assumption setting processes through live pricing exercises, delivering the full solution on Databricks.
          - Collaborated with the project manager to develop a change control and training plans for the team.

    - role: Deputy Appointed Actuary
      time: Oct 2020 - Feb 2022
      company: Westpac Life Insurance Services Limited, Australia 
      details: |
        Reporting to Appointed Actuary 

        **Key achievement:** Accelerated experience analysis components from months to 
        weeks - the more rapid granular analysis supported flexible financial 
        modelling/ scenario testing.

          - I joined the team to support the sale of the life business by 
            Westpac Group through due diligence analysis, buyer workshops and 
            Q&A sessions.
          - Owned the BAU experience data analysis, reporting and review process. 
          - Led the team’s efforts in streamlining the analysis processes
               - automated data ETL, Alteryx to SQL database
               - visualised deterministic predicted claim confidence intervals against actuals, Tableau
               - applied supervised learning methods to derive adjustments to predictions, R
               - communicated outcomes to the leadership team and managed stakeholders.
          - Led data driven initiatives that contributed to pricing refinements.
          - Led monthly AIFRS profit, regulatory reporting, and financial analysis; communicated key results drivers to senior and executive management.
          - Managed and developed a cross-functional team including offshore members.

    - role: Head of Business Finance
      time: Feb 2019 - Sep 2020
      company: Reinsurance Group of America, Australia (RGAA)
      details: |
        Reporting to the Chief Financial Officer (CFO) 

        **Key achievement:** Accelerated BAU financial analysis from days to hours - 
        tools highly praised by the Board and adopted in other geographies.

          - Led the team’s efforts in a complete automation of financial 
            analysis and reporting, leveraging database architecture to eliminate 
            dependencies on spreadsheets and streamline reporting and data 
            visualization software to deliver tailored data-driven reporting.
          - Owned the financial analysis and communication process and outcome. 
            Challenged the result, drawing on strong relationships with other 
            business functions.
          - Championed data driven initiatives and projects that facilitated proactive 
            client engagement.
          - Collaborated with the legal, pricing, underwriting and claims teams 
            on deep-dive analyses of performance drivers for selected blocks of 
            business.
          - Developed best-of-breed dynamic performance dashboards for senior 
            management and local and parent Board / Board Committees.

    - role: Deputy Chief Valuation Actuary, Previously 2IC
      time: May 2016 - Jan 2019
      company: Reinsurance Group of America, Australia (RGAA)
      details: |
        Reporting to the Appointed Actuary

         **Key achievement:** Together with the Chief Valuation Actuary (CVA), re-staffed and 
        upskilled a team that had experienced high turnover, resulting in significant 
        control uplifts.

          - Led monthly reporting, profit analysis, Regulatory Capital and APRA reporting; supported delivery of ICAAP and FCR; assisted the Appointed Actuary in preparing actuarial advice.
          - Championed 1st line of defence improvements; led cross-functional knowledge sharing and team development initiatives.

    - role: Research Actuary
      time: May 2014 - Apr 2016
