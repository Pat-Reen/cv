<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a5261;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4B6A78;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6a9aad;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4B6A78;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)" />

  <!-- Subtle grid lines -->
  <line x1="0" y1="160" x2="1280" y2="160" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="320" x2="1280" y2="320" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="640" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="640" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="640" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="640" fill="#97c5d8" opacity="0.6"/>

  <!-- Name -->
  <text x="80" y="240" font-family="Georgia, serif" font-size="96" font-weight="bold" fill="#ffffff" opacity="0.97">Pat Reen</text>

  <!-- Divider line -->
  <rect x="80" y="268" width="420" height="3" fill="#97c5d8" opacity="0.7" rx="2"/>

  <!-- Tagline pills -->
  <g transform="translate(80, 310)">
    <!-- Data Strategy -->
    <rect x="0" y="0" width="196" height="44" rx="22" fill="#ffffff" fill-opacity="0.12"/>
    <text x="98" y="28" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" opacity="0.9">Data Strategy</text>

    <!-- Cloud Platforms -->
    <rect x="212" y="0" width="216" height="44" rx="22" fill="#ffffff" fill-opacity="0.12"/>
    <text x="320" y="28" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" opacity="0.9">Cloud Platforms</text>

    <!-- Analytics -->
    <rect x="444" y="0" width="148" height="44" rx="22" fill="#ffffff" fill-opacity="0.12"/>
    <text x="518" y="28" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" opacity="0.9">Analytics</text>

    <!-- Statistics -->
    <rect x="608" y="0" width="154" height="44" rx="22" fill="#ffffff" fill-opacity="0.12"/>
    <text x="685" y="28" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" opacity="0.9">Statistics</text>

    <!-- AI -->
    <rect x="778" y="0" width="72" height="44" rx="22" fill="#ffffff" fill-opacity="0.12"/>
    <text x="814" y="28" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" opacity="0.9">AI</text>
  </g>

  <!-- Bottom role line -->
  <text x="80" y="430" font-family="Arial, sans-serif" font-size="28" fill="#c8dde6" opacity="0.85">Head of Portfolio Insights · ClearView Wealth · Sydney</text>

  <!-- Bottom URL -->
  <text x="80" y="580" font-family="Arial, sans-serif" font-size="22" fill="#97c5d8" opacity="0.7">pat-reen.github.io/cv</text>

  <!-- Decorative circle element top right -->
  <circle cx="1180" cy="100" r="180" fill="#ffffff" fill-opacity="0.03"/>
  <circle cx="1180" cy="100" r="120" fill="#ffffff" fill-opacity="0.03"/>
  <circle cx="1180" cy="100" r="60" fill="#ffffff" fill-opacity="0.04"/>
</svg>
